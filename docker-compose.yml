version: '3.13'

services:
  django:
    build: .
    container_name: django_app
    command: gunicorn Fitness_club.wsgi:application --bind 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    # Для локального тестирования, используйте ваш хост (например, host.docker.internal)

  celery:
    build: .
    command: celery -A FitnessApp worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis